server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml
        application/font-woff
        application/font-woff2;

    # Cache hashed assets forever (Angular output hashing makes this safe)
    location ~* \.[0-9a-f]{8}\.(js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Cache images and fonts for a week
    location ~* \.(jpg|jpeg|png|gif|ico|svg|woff|woff2|pdf)$ {
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # index.html must always revalidate (no hashing on it)
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # SPA routing — all unmatched paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}